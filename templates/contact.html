{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <h1 class="text-center mb-5">
        Contact Us
    </h1>

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <form>

                <div class="mb-3">

                    <label>Name</label>

                    <input
                        type="text"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label>Message</label>

                    <textarea
                        rows="5"
                        class="form-control"></textarea>

                </div>

                <button class="btn btn-warning">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
